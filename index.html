<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bit-Dungeon</title>
<style>
    *{ box-sizing:border-box; margin:0; padding:0; image-rendering:pixelated; user-select:none; touch-action: none; }
    body{ background:#0a0a0a; color:#fff; font-family:'Courier New', monospace; display:flex; align-items:center; justify-content:center; height:100dvh; width:100vw; overflow:hidden; }
    .game-system { display: flex; flex-direction: row; align-items: center; justify-content: space-evenly; width: 100%; max-width: 950px; padding: 5px; }
    .hud-column { display: flex; flex-direction: column; gap: 8px; width: 140px; }
    .game-title { font-weight: bold; font-size: 14px; color: #f0f; text-align: center; background: #111; border: 2px solid #333; padding: 4px; text-shadow: 2px 2px #000; }
    .hud-panel { background: #1a1a1a; border: 2px solid #444; padding: 4px; display: grid; gap: 3px; }
    .hud-item { background: #111; border: 1px solid #333; padding: 3px 5px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
    .hud-item b { color: #fff; font-size: 11px; }
    .side-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .dpad, .diamond { display: grid; grid-template-columns: repeat(3, 58px); grid-template-rows: repeat(3, 58px); gap: 4px; }
    .pixel-btn { background: #222; border: 3px solid #444; color: #eee; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: inset -3px -3px #000; border-radius: 8px; cursor: pointer; }
    .pixel-btn:active { background: #555; transform: scale(0.95); }
    .d-up{ grid-column:2; grid-row:1; } .d-left{ grid-column:1; grid-row:2; } .d-right{ grid-column:3; grid-row:2; } .d-down{ grid-column:2; grid-row:3; }
    .btn-swd{ grid-column:1; grid-row:2; } .btn-shd{ grid-column:2; grid-row:1; } .btn-trc{ grid-column:2; grid-row:3; } .btn-pot{ grid-column:3; grid-row:2; }
    .screen-container { position: relative; border: 6px solid #333; background: #000; display: flex; box-shadow: 0 0 20px rgba(0,0,0,1); }
    canvas { background: #050505; width: 320px; height: 320px; }
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
    @media (orientation: portrait) { body::after { content: "PLEASE ROTATE YOUR PHONE"; position: fixed; inset: 0; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; z-index: 999; } }
</style>
</head>
<body>

<div class="game-system">
    <div class="side-controls">
        <div class="hud-column">
            <div class="game-title">Bit-Dungeon</div>
            <div class="hud-panel">
                <div class="hud-item">HP <b id="hp">❤️20</b></div>
                <div class="hud-item">LVL <b id="lvl">✨1</b></div>
                <div class="hud-item">XP <b id="xp">0/8</b></div>
            </div>
            <div class="hud-panel">
                <div class="hud-item">ATK <b id="atk">🦾1</b></div>
                <div class="hud-item">DEF <b id="def">🗿0</b></div>
                <div class="hud-item">FLR <b id="fl">🪜1</b></div>
            </div>
        </div>
        <div class="dpad">
            <div class="pixel-btn d-up" onmousedown="handleInput('w')" ontouchstart="event.preventDefault(); handleInput('w')">▲</div>
            <div class="pixel-btn d-left" onmousedown="handleInput('a')" ontouchstart="event.preventDefault(); handleInput('a')">◀</div>
            <div class="pixel-btn d-right" onmousedown="handleInput('d')" ontouchstart="event.preventDefault(); handleInput('d')">▶</div>
            <div class="pixel-btn d-down" onmousedown="handleInput('s')" ontouchstart="event.preventDefault(); handleInput('s')">▼</div>
        </div>
    </div>

    <div class="screen-container" id="shake-target">
        <canvas id="game" width="320" height="320"></canvas>
        <div class="overlay" id="gameOver">
            <h1 id="statusTitle" style="font-size: 20px; color:#f00;">THE DUNGEON CONSUMES YOU</h1>
            <p id="stats-summary" style="font-size: 11px; margin: 15px; color: #888;"></p>
            <button onclick="location.reload()" style="padding:12px 24px; cursor:pointer; background:#200; color:#f00; border:2px solid #600; font-family:monospace;">ANOTHER SOUL ENTERS</button>
        </div>
    </div>

    <div class="side-controls">
        <div class="hud-column">
            <div class="hud-panel">
                <div class="hud-item">SWD <b id="h-sw">🗡️10</b></div>
                <div class="hud-item">SHD <b id="h-sh">🛡️10</b></div>
            </div>
            <div class="hud-panel">
                <div class="hud-item">TRC <b id="h-tr">🔥20</b></div>
                <div class="hud-item">POT <b id="h-pt">🧪1</b></div>
                <div class="hud-item">COIN <b id="coins">💰0</b></div>
                <div class="hud-item">LIT <b id="light">💡OFF</b></div>
            </div>
        </div>
        <div class="diamond">
            <div class="pixel-btn btn-swd" onclick="handleInput('q')">🗡️</div>
            <div class="pixel-btn btn-shd" onclick="handleInput('e')">🛡️</div>
            <div class="pixel-btn btn-trc" onclick="handleInput('r')">🔥</div>
            <div class="pixel-btn btn-pot" onclick="handleInput('t')">🧪</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const shakeTarget = document.getElementById('shake-target');
const TILE_SIZE = 16, MAP_SIZE = 20;

const ENEMIES = {
    // FIXED: Removed text and spaces from the icon list
    lvl1: { hp: 2, atk: 2, def: 0, xp: 1, drop: 0.2, icons: ['🪲','🕷️','🦂'] },
    lvl2: { hp: 10, atk: 3, def: 1, xp: 3, drop: 0.4, icons: ['🦎','🐀','🦇'] },
    lvl3: { hp: 25, atk: 5, def: 2, xp: 8, drop: 0.6, icons: ['🐺','🧟','💀'] }
};

const XP_TABLE = [0, 8, 16, 32, 64, 128, 256, 512];
const EMOJIS = { player:'⚔️', stairs:'🪜', potion:'🧪', coin:'🪙', sword:'🗡️', shield:'🛡️', torch:'🔥', merchant: '👳' };

let map = [], enemies = [], items = [], explored = [];
let torchActive = false, coins = 0, stairsPos = {x:0, y:0};
let inv = { torchDur: 20, potions: 1, swordDur: 10, shieldDur: 10 };
let player = { x:1, y:1, hp:20, maxHp:20, atk:1, def:0, lvl:1, xp:0, floor:1, swdOn:false, shdOn:false };
let currentWallColor = '#444';
let slashState = 0;

const AudioEngine = {
    ctx: null, musicStarted: false,
    init() { 
        if (!this.ctx) { 
            this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            this.startMusic(); 
        } 
        if (this.ctx.state === 'suspended') this.ctx.resume(); 
    },
    startMusic() {
        if (this.musicStarted) return; this.musicStarted = true;
        const playLayer = (freq, vol, speed) => {
            const osc = this.ctx.createOscillator(); const lfo = this.ctx.createOscillator(); const lfoGain = this.ctx.createGain(); const gain = this.ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            lfo.type = 'sine'; lfo.frequency.setValueAtTime(speed, this.ctx.currentTime);
            lfoGain.gain.setValueAtTime(freq * 0.02, this.ctx.currentTime); gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency); osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); lfo.start();
        };
        playLayer(60, 0.005, 0.1); playLayer(85, 0.005, 0.15);
    },
    play(freq, type, dur, vol = 0.1, freqEnd = null) {
        this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, this.ctx.currentTime + dur);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + dur);
    },
    noise(dur, vol = 0.05) {
        this.init(); const bufferSize = this.ctx.sampleRate * dur; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const source = this.ctx.createBufferSource(); source.buffer = buffer;
        const gain = this.ctx.createGain(); gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        source.connect(gain); gain.connect(this.ctx.destination); source.start();
    },
    sfx(type) {
        if(!this.ctx) return;
        switch(type) {
            case 'sword-on': this.play(800, 'sine', 0.1, 0.1, 1200); break;
            case 'sword-off': this.play(400, 'sine', 0.1, 0.1, 200); break;
            case 'shield-on': this.play(300, 'square', 0.1, 0.05, 500); break;
            case 'shield-off': this.play(300, 'square', 0.1, 0.05, 150); break;
            case 'torch': this.noise(0.2, 0.1); break;
            case 'potion': this.play(200, 'sine', 0.3, 0.1, 600); break;
            case 'ui-click': this.play(1000, 'sine', 0.05, 0.05); break;
            case 'sword-hit': this.play(1200, 'sine', 0.1, 0.05); this.play(800, 'triangle', 0.15); break;
            case 'punch': this.play(120, 'triangle', 0.1); break;
            case 'block': this.play(400, 'square', 0.08, 0.05); break;
            case 'hurt': this.play(100, 'sawtooth', 0.2); break;
            case 'pickup': this.play(600, 'sine', 0.1); setTimeout(()=>this.play(900, 'sine', 0.1), 50); break;
            case 'lvl': this.play(440, 'sine', 0.2); setTimeout(()=>this.play(880, 'sine', 0.4), 100); break;
        }
    }
};

function shake(amt = 4) {
    shakeTarget.style.transform = `translate(${Math.random()*amt-amt/2}px, ${Math.random()*amt-amt/2}px)`;
    setTimeout(() => shakeTarget.style.transform = 'translate(0,0)', 50);
}

function generateMap() {
    const isSpecialFloor = (player.floor === 1 || player.floor === 5 || player.floor === 10);
    const useMaze = !isSpecialFloor && Math.random() > 0.5;
    const themes = ['#2d3b2d', '#3b2d2d', '#3b362d', '#2d323b', '#423d21'];
    currentWallColor = themes[Math.floor(Math.random() * themes.length)];
    if (useMaze) generateMaze(); else generateCaves();
    spawnItemsForFloor(); spawnEnemiesForFloor(); updateExploration(); updateUI();
}

function generateCaves() {
    map = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(1));
    explored = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(false));
    enemies = []; items = [];
    let cx = 1, cy = 1, floorTiles = [{x:1, y:1}];
    map[cy][cx] = 0;
    for(let i=0; i<180; i++) {
        let dir = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
        let nx = Math.max(1, Math.min(MAP_SIZE-2, cx + dir.x));
        let ny = Math.max(1, Math.min(MAP_SIZE-2, cy + dir.y));
        if(map[ny][nx] === 1) { map[ny][nx] = 0; floorTiles.push({x:nx, y:ny}); }
        cx = nx; cy = ny;
    }
    player.x = 1; player.y = 1;
    setFurthestStairs(floorTiles);
}

function generateMaze() {
    map = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(1));
    explored = Array.from({length: MAP_SIZE}, () => Array(MAP_SIZE).fill(false));
    enemies = []; items = [];
    let floorTiles = [];
    function carve(x, y) {
        map[y][x] = 0; floorTiles.push({x, y});
        let dirs = [{x:2,y:0},{x:-2,y:0},{x:0,y:2},{x:0,y:-2}].sort(()=>Math.random()-0.5);
        for (let d of dirs) {
            let nx = x + d.x, ny = y + d.y;
            if (nx>0 && nx<MAP_SIZE-1 && ny>0 && ny<MAP_SIZE-1 && map[ny][nx]===1) {
                map[y+d.y/2][x+d.x/2] = 0; floorTiles.push({x: x+d.x/2, y: y+d.y/2});
                carve(nx, ny);
            }
        }
    }
    carve(1, 1);
    player.x = 1; player.y = 1;
    setFurthestStairs(floorTiles);
}

function setFurthestStairs(tiles) {
    let maxDist = 0, bestTile = tiles[0];
    tiles.forEach(t => {
        let d = Math.abs(t.x - player.x) + Math.abs(t.y - player.y);
        if (d > maxDist) { maxDist = d; bestTile = t; }
    });
    stairsPos = bestTile;
}

function spawnItemsForFloor() {
    if(player.floor === 5) {
        let m = stairsPos;
        items.push({x:m.x-1, y:m.y, type:'merchant'}, {x:m.x-1, y:m.y-1, type:'potion', cost:5}, {x:m.x, y:m.y-1, type:'sword', cost:5}, {x:m.x+1, y:m.y-1, type:'torch', cost:5}, {x:m.x+1, y:m.y, type:'shield', cost:5});
    } else {
        spawnItem('torch'); 
        if(Math.random() < 0.20) spawnItem('sword'); 
        if(Math.random() < 0.20) spawnItem('shield'); 
    }
}

function spawnEnemiesForFloor() {
    let count = 4 + Math.floor(player.floor / 2);
    for(let i = 0; i < count; i++) {
        let type = player.floor >= 7 ? (Math.random()>0.4?'lvl3':'lvl2') : (player.floor>=4 && Math.random()>0.5?'lvl2':'lvl1');
        spawnEnemy(type);
    }
}

function handleInput(key) {
    if(player.hp <= 0) return;
    const k = key.toLowerCase(); AudioEngine.init();
    if(['w','a','s','d','q','e','r','t'].includes(k)) AudioEngine.sfx('ui-click');
    if(['w','a','s','d'].includes(k)) tryMove(k);
    if(k==='q') { if(inv.swordDur > 0) { player.swdOn = !player.swdOn; AudioEngine.sfx(player.swdOn?'sword-on':'sword-off'); } }
    if(k==='e') { if(inv.shieldDur > 0) { player.shdOn = !player.shdOn; AudioEngine.sfx(player.shdOn?'shield-on':'shield-off'); } }
    if(k==='r') { if(inv.torchDur > 0) { torchActive = !torchActive; AudioEngine.sfx('torch'); } }
    if(k==='t') { if(inv.potions > 0 && player.hp < player.maxHp) { player.hp = Math.min(player.maxHp, player.hp + 8); inv.potions--; AudioEngine.sfx('potion'); } }
    updateUI();
}

function tryMove(k) {
    let dx=0, dy=0; 
    if(k==='w') dy=-1; if(k==='s') dy=1; 
    if(k==='a') dx=-1; if(k==='d') dx=1;
    const nx = player.x + dx, ny = player.y + dy;
    
    if(nx < 0 || nx >= MAP_SIZE || ny < 0 || ny >= MAP_SIZE) return;

    const aliveEnemyIdx = enemies.findIndex(e => e.x === nx && e.y === ny && !e.dead);
    if(aliveEnemyIdx > -1) { 
        let enemy = enemies[aliveEnemyIdx];
        let pAtk = player.atk + (player.swdOn ? 4 : 0);
        enemy.hp -= Math.max(1, pAtk - enemy.def);
        AudioEngine.sfx(player.swdOn ? 'sword-hit' : 'punch');
        if(player.swdOn) { inv.swordDur--; if(inv.swordDur <= 0) { player.swdOn=false; AudioEngine.sfx('sword-off'); } }
        enemy.slashTimer = 6; enemy.slashDir = (slashState++ % 2 === 0) ? '/' : '\\'; 
        shake(2);
        if(enemy.hp <= 0) { 
            enemy.dead = true; gainXp(enemy.xp); 
            if(Math.random() < enemy.drop) items.push({x:nx, y:ny, type: Math.random() > 0.1 ? 'coin' : 'potion'});
        }
        moveEnemies(); updateUI(); return; 
    } 

    if(map[ny][nx] === 0) { 
        player.x = nx; player.y = ny;
        if(torchActive) {
            inv.torchDur--;
            if(inv.torchDur <= 0) { torchActive = false; AudioEngine.sfx('torch'); }
        }
        updateExploration(); 
    }

    checkItems();

    if(player.x === stairsPos.x && player.y === stairsPos.y) {
        if(player.floor === 10) {
            endGame(true);
        } else {
            player.floor++;
            generateMap();
            AudioEngine.sfx('pickup');
            return;
        }
    } else {
        moveEnemies();
    }

    if(player.hp <= 0) endGame(false);
    updateUI();
}

function moveEnemies() {
    enemies.forEach(e => {
        if(e.dead) return;
        let dist = Math.abs(player.x - e.x) + Math.abs(player.y - e.y);
        if(e.charging) { 
            if(dist <= 1) {
                let pDef = player.def + (player.shdOn ? 4 : 0);
                player.hp -= Math.max(1, e.atk - pDef);
                if(player.shdOn) { inv.shieldDur--; AudioEngine.sfx('block'); if(inv.shieldDur <= 0) player.shdOn=false; }
                else AudioEngine.sfx('hurt');
                shake(5);
            } e.charging = false;
        } else if(dist < 6) { 
            const mx = player.x > e.x ? 1 : player.x < e.x ? -1 : 0, my = player.y > e.y ? 1 : player.y < e.y ? -1 : 0;
            if(map[e.y+my] && map[e.y+my][e.x+mx] === 0 && !enemies.some(en => !en.dead && en.x === e.x+mx && en.y === e.y+my)) { 
                e.x += mx; e.y += my; 
            }
            if(Math.abs(player.x-e.x) <= 1 && Math.abs(player.y-e.y) <= 1) e.charging = true; 
        }
    });
}

function gainXp(amt) {
    player.xp += amt;
    if(player.lvl < 7 && player.xp >= XP_TABLE[player.lvl]) {
        player.xp -= XP_TABLE[player.lvl]; player.lvl++; player.maxHp += 4; player.hp = player.maxHp; player.atk += 1; AudioEngine.sfx('lvl');
    }
}

function checkItems() {
    items = items.filter(i => {
        if(i.x === player.x && i.y === player.y) {
            if(i.cost && coins < i.cost) return true; 
            if(i.cost) coins -= i.cost;
            if(i.type === 'sword') inv.swordDur = 15; 
            if(i.type === 'shield') inv.shieldDur = 15; 
            if(i.type === 'torch') inv.torchDur = 30; 
            if(i.type === 'potion') inv.potions += 1; 
            if(i.type === 'coin') coins += 1;
            AudioEngine.sfx('pickup'); return false; 
        } return true;
    });
}

function render() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,320); 
    const range = torchActive ? 4 : 1; 
    for(let y=0; y<MAP_SIZE; y++) {
        for(let x=0; x<MAP_SIZE; x++) {
            if(!explored[y][x]) continue; 
            const inSight = Math.abs(player.x-x)<=range && Math.abs(player.y-y)<=range;
            ctx.fillStyle = map[y][x] === 1 ? (inSight ? currentWallColor : '#222') : (inSight ? '#111' : '#070707');
            ctx.fillRect(x*16, y*16, 16, 16);
        }
    }
    
    // Render stairs
    if(explored[stairsPos.y][stairsPos.x]) {
        const inSight = Math.abs(player.x-stairsPos.x)<=range && Math.abs(player.y-stairsPos.y)<=range;
        if(inSight) drawEmoji(stairsPos.x, stairsPos.y, EMOJIS.stairs);
    }

    // Render Items
    items.forEach(i => { 
        if(explored[i.y][i.x] && Math.abs(player.x-i.x)<=range && Math.abs(player.y-i.y)<=range) drawEmoji(i.x, i.y, EMOJIS[i.type] || '❓'); 
    });

    // Render Enemy remains
    enemies.forEach(e => { 
        if(e.dead && explored[e.y][e.x] && Math.abs(player.x-e.x)<=range && Math.abs(player.y-e.y)<=range) { 
            ctx.fillStyle='rgba(80,0,0,0.4)'; ctx.fillRect(e.x*16, e.y*16, 16, 16); 
        } 
    });

    // Render Player
    drawEmoji(player.x, player.y, EMOJIS.player);

    // Render Living Enemies
    enemies.forEach(e => {
        if(!e.dead && Math.abs(player.x-e.x)<=range && Math.abs(player.y-e.y)<=range) {
            if(e.charging) { ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(e.x*16, e.y*16, 16, 16); }
            drawEmoji(e.x, e.y, e.emoji);
            if(e.slashTimer > 0) { 
                ctx.strokeStyle = '#f00'; ctx.lineWidth = 2; ctx.beginPath(); 
                if(e.slashDir === '/') { ctx.moveTo(e.x*16+13, e.y*16+3); ctx.lineTo(e.x*16+3, e.y*16+13); } 
                else { ctx.moveTo(e.x*16+3, e.y*16+3); ctx.lineTo(e.x*16+13, e.y*16+13); } 
                ctx.stroke(); e.slashTimer--; 
            }
        }
    });
}

function drawEmoji(x,y,e){ ctx.font='12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff'; ctx.fillText(e, x*16+8, y*16+9); }

function spawnEnemy(lvl) {
    let x, y, d = ENEMIES[lvl], attempts = 0;
    do { x = Math.floor(Math.random()*18)+1; y = Math.floor(Math.random()*18)+1; attempts++; } 
    while ((map[y][x]===1 || (Math.abs(x-player.x)<3 && Math.abs(y-player.y)<3)) && attempts < 100);
    if(attempts < 100) enemies.push({ x, y, ...d, hp: d.hp, dead:false, charging:false, slashTimer:0, slashDir:'/', emoji: d.icons[Math.floor(Math.random()*d.icons.length)] });
}

function spawnItem(type) {
    let x, y, attempts = 0;
    do { x = Math.floor(Math.random()*18)+1; y = Math.floor(Math.random()*18)+1; attempts++; } while (map[y][x]===1 && attempts < 100);
    if(attempts < 100) items.push({x, y, type});
}

function updateExploration() {
    const r = torchActive ? 4 : 1;
    for(let y=player.y-r; y<=player.y+r; y++) {
        for(let x=player.x-r; x<=player.x+r; x++) {
            if(y>=0 && y<MAP_SIZE && x>=0 && x<MAP_SIZE) explored[y][x] = true;
        }
    }
}

function updateUI() {
    document.getElementById('lvl').textContent = `✨${player.lvl}`; 
    document.getElementById('hp').textContent = `❤️${player.hp}`; 
    document.getElementById('atk').textContent = `🦾${player.atk + (player.swdOn?4:0)}`; 
    document.getElementById('def').textContent = `🗿${player.def + (player.shdOn?4:0)}`; 
    document.getElementById('xp').textContent = player.lvl < 7 ? `${player.xp}/${XP_TABLE[player.lvl]}` : 'MAX'; 
    document.getElementById('fl').textContent = `🪜${player.floor}`; 
    document.getElementById('light').textContent = torchActive ? '💡ON' : '💡OFF'; 
    document.getElementById('h-sw').textContent = `🗡️${inv.swordDur}`; 
    document.getElementById('h-sh').textContent = `🛡️${inv.shieldDur}`; 
    document.getElementById('h-tr').textContent = `🔥${inv.torchDur}`; 
    document.getElementById('h-pt').textContent = `🧪${inv.potions}`; 
    document.getElementById('coins').textContent = `💰${coins}`;
}

function endGame(win) {
    const overlay = document.getElementById('gameOver');
    const summary = document.getElementById('stats-summary');
    const title = document.getElementById('statusTitle');
    overlay.style.display = 'flex'; 
    if (win) {
        title.textContent = "THE LIGHT REACHED"; title.style.color = "#0f0";
        summary.textContent = `You escaped after ${player.floor} floors.`;
    } else {
        title.textContent = "THE DUNGEON CONSUMES YOU"; title.style.color = "#f00";
        summary.textContent = `Floor ${player.floor} claimed your spirit.`;
    }
}

function loop() { render(); requestAnimationFrame(loop); }
generateMap(); loop();
window.addEventListener('keydown', e => handleInput(e.key));
</script>
</body>
</html>
